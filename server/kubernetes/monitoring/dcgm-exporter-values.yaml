# NVIDIA DCGM Exporter Helm values for GPU metrics

image:
  repository: nvcr.io/nvidia/k8s/dcgm-exporter
  tag: 3.3.8-3.6.0-ubuntu22.04

serviceMonitor:
  enabled: true
  namespace: monitoring
  additionalLabels:
    release: monitoring

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

nodeSelector:
  workload-type: gpu-inference

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

extraEnv:
  - name: DCGM_EXPORTER_KUBERNETES
    value: "true"
  - name: DCGM_EXPORTER_LISTEN
    value: ":9400"

arguments:
  - "-f"
  - "/etc/dcgm-exporter/dcp-metrics-included.csv"

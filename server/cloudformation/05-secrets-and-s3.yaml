AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for model weights, Secrets Manager for HF token, and IRSA role for vLLM service account

Parameters:
  OIDCProviderArn:
    Type: String
    Description: ARN of the EKS OIDC provider
  OIDCProviderUrl:
    Type: String
    Description: OIDC provider URL without https:// prefix

Resources:
  # ──────────────────────────────────────────────
  # S3 Bucket for LLaMA model weights
  # ──────────────────────────────────────────────
  ModelBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "local-llm-llama-model-weights-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: local-llm-llama-model-weights

  ModelBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ModelBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSLAccess
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ModelBucket.Arn
              - !Sub '${ModelBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ──────────────────────────────────────────────
  # Secrets Manager – HuggingFace token
  # ──────────────────────────────────────────────
  HFTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: local-llm-llama/hf-token
      Description: HuggingFace API token for LLaMA model access
      SecretString: 'PLACEHOLDER-UPDATE-WITH-REAL-TOKEN'
      Tags:
        - Key: Name
          Value: local-llm-llama-hf-token

  # ──────────────────────────────────────────────
  # IAM – S3 access policy for vLLM pods
  # ──────────────────────────────────────────────
  VllmS3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: local-llm-llama-vllm-s3-access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Sub "arn:aws:s3:::local-llm-llama-model-weights-${AWS::AccountId}/*"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::local-llm-llama-model-weights-${AWS::AccountId}"

  # ──────────────────────────────────────────────
  # IAM – IRSA role for vLLM service account
  # ──────────────────────────────────────────────
  VllmServiceAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: local-llm-llama-eks-vllm-sa-role
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Principal": {"Federated": "${OIDCProviderArn}"},
            "Action": "sts:AssumeRoleWithWebIdentity",
            "Condition": {
              "StringEquals": {
                "${OIDCProviderUrl}:sub": "system:serviceaccount:vllm:vllm-sa",
                "${OIDCProviderUrl}:aud": "sts.amazonaws.com"
              }
            }
          }]
        }
      ManagedPolicyArns:
        - !Ref VllmS3AccessPolicy

Outputs:
  ModelBucketName:
    Description: Name of the S3 bucket for model weights
    Value: !Ref ModelBucket
    Export:
      Name: local-llm-llama-secrets-ModelBucketName

  ModelBucketArn:
    Description: ARN of the S3 bucket for model weights
    Value: !GetAtt ModelBucket.Arn
    Export:
      Name: local-llm-llama-secrets-ModelBucketArn

  HFTokenSecretArn:
    Description: ARN of the HuggingFace token secret
    Value: !Ref HFTokenSecret
    Export:
      Name: local-llm-llama-secrets-HFTokenSecretArn

  VllmRoleArn:
    Description: ARN of the IAM role for vLLM service account
    Value: !GetAtt VllmServiceAccountRole.Arn
    Export:
      Name: local-llm-llama-secrets-VllmRoleArn

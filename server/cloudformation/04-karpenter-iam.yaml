AWSTemplateFormatVersion: '2010-09-09'
Description: Karpenter IAM resources for llama EKS cluster

Parameters:
  OIDCProviderArn:
    Type: String
    Description: ARN of the EKS OIDC provider
  OIDCProviderUrl:
    Type: String
    Description: OIDC provider URL without https:// prefix

Resources:
  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: KarpenterNodeRole-local-llm-llama-eks
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  KarpenterInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: KarpenterNodeInstanceProfile-local-llm-llama-eks
      Roles:
        - !Ref KarpenterNodeRole

  KarpenterInterruptionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: local-llm-llama-eks
      MessageRetentionPeriod: 300
      SqsManagedSseEnabled: true

  KarpenterInterruptionQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref KarpenterInterruptionQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt KarpenterInterruptionQueue.Arn
          - Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt KarpenterInterruptionQueue.Arn

  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: local-llm-llama-eks-karpenter-controller
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Principal": {"Federated": "${OIDCProviderArn}"},
            "Action": "sts:AssumeRoleWithWebIdentity",
            "Condition": {
              "StringEquals": {
                "${OIDCProviderUrl}:sub": "system:serviceaccount:karpenter:karpenter",
                "${OIDCProviderUrl}:aud": "sts.amazonaws.com"
              }
            }
          }]
        }
      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EC2Permissions
                Effect: Allow
                Action:
                  - ec2:CreateFleet
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - ec2:TerminateInstances
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeImages
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeSpotPriceHistory
                  - ec2:DescribeInstanceTypeOfferings
                  - ec2:CreateLaunchTemplate
                  - ec2:DeleteLaunchTemplate
                Resource: '*'
              - Sid: IAMInstanceProfile
                Effect: Allow
                Action:
                  - iam:GetInstanceProfile
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                Resource: '*'
              - Sid: PassRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt KarpenterNodeRole.Arn
              - Sid: SSMGetParameter
                Effect: Allow
                Action: ssm:GetParameter
                Resource: '*'
              - Sid: PricingGetProducts
                Effect: Allow
                Action: pricing:GetProducts
                Resource: '*'
              - Sid: SQSPermissions
                Effect: Allow
                Action:
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ReceiveMessage
                Resource: !GetAtt KarpenterInterruptionQueue.Arn
              - Sid: EKSDescribeCluster
                Effect: Allow
                Action: eks:DescribeCluster
                Resource: !Sub
                  - arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}
                  - ClusterName: !ImportValue local-llm-llama-eks-ClusterName

  SpotInterruptionRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Spot Instance Interruption Warning
      Targets:
        - Id: KarpenterInterruptionQueueTarget
          Arn: !GetAtt KarpenterInterruptionQueue.Arn

  InstanceStateChangeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance State-change Notification
      Targets:
        - Id: KarpenterInterruptionQueueTarget
          Arn: !GetAtt KarpenterInterruptionQueue.Arn

  InstanceRebalanceRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance Rebalance Recommendation
      Targets:
        - Id: KarpenterInterruptionQueueTarget
          Arn: !GetAtt KarpenterInterruptionQueue.Arn

  ScheduledChangeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.health
        detail-type:
          - AWS Health Event
        detail:
          service:
            - EC2
          eventTypeCategory:
            - scheduledChange
      Targets:
        - Id: KarpenterInterruptionQueueTarget
          Arn: !GetAtt KarpenterInterruptionQueue.Arn

Outputs:
  KarpenterControllerRoleArn:
    Description: ARN of the Karpenter controller IAM role
    Value: !GetAtt KarpenterControllerRole.Arn
    Export:
      Name: local-llm-llama-karpenter-ControllerRoleArn

  KarpenterNodeRoleName:
    Description: Name of the Karpenter node IAM role
    Value: !Ref KarpenterNodeRole
    Export:
      Name: local-llm-llama-karpenter-NodeRoleName

  KarpenterInstanceProfileName:
    Description: Name of the Karpenter instance profile
    Value: !Ref KarpenterInstanceProfile
    Export:
      Name: local-llm-llama-karpenter-InstanceProfileName

  InterruptionQueueName:
    Description: Name of the Karpenter interruption SQS queue
    Value: !GetAtt KarpenterInterruptionQueue.QueueName
    Export:
      Name: local-llm-llama-karpenter-QueueName

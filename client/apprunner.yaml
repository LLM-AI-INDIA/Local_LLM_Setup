version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - npm ci
      - npx prisma generate
      - npm run build
run:
  runtime-version: 18
  command: npx prisma db push --skip-generate && node .next/standalone/server.js
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: HOSTNAME
      value: 0.0.0.0
    - name: DATABASE_URL
      value: "file:./data/llmatscale.db"
    - name: PORT
      value: "3000"
